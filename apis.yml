type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
description: >-
  Alpha Vantage is a financial data platform providing real-time and historical
  market data for stocks, options, cryptocurrencies, forex, commodities, and
  economic indicators. The API supports 50+ technical indicators, fundamental
  data, Alpha Intelligence sentiment analysis, and earnings data, all accessed
  through a single query endpoint using function-based routing.
created: '2024-11-07'
modified: '2026-04-19'
specificationVersion: '0.19'
apis:
  - aid: alpha-vantage:market-data-api
    name: Alpha Vantage Market Data API
    description: >-
      Real-time and historical stock market data API supporting time series,
      global quotes, symbol search, fundamental data, technical indicators,
      forex/crypto exchange rates, economic indicators, and news sentiment
      analysis via function-based query parameter routing.
    humanURL: https://www.alphavantage.co/documentation/
    baseURL: https://www.alphavantage.co
    tags:
