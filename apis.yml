description: >-
  Alpha Vantage provides a single REST market-data API at https://www.alphavantage.co/query exposing 100+ functions
  across stocks (intraday/daily/weekly/monthly time series, global quote), fundamentals (income statement, balance
  sheet, cash flow, earnings), forex, crypto, commodities, economic indicators, technical indicators (50+ TA functions),
  Alpha Intelligence (news, sentiment, insider transactions, top gainers/losers), and options data. Authentication is by
  apikey query parameter; output is JSON or CSV.
