common:
  - url: https://www.alphavantage.co/
    type: Website
  - url: https://www.alphavantage.co/documentation/
    type: Documentation
  - url: https://www.alphavantage.co/support/#support
    type: Support
  - url: https://www.alphavantage.co/support/#api-key
    type: SignUp
  - url: https://www.alphavantage.co/premium/
    type: Pricing
  - url: rules/alpha-vantage-spectral-rules.yml
    type: SpectralRules
  - url: vocabulary/alpha-vantage-vocabulary.yaml
    type: Vocabulary
  - url: capabilities/financial-data-analytics.yaml
    type: NaftikoCapability
  - type: Features
    data:
      - name: Stock Time Series
        description: >-
          Intraday (1min to 60min), daily, weekly, and monthly OHLCV stock price
          data for 20+ years of history with compact and full output modes.
      - name: Real-Time Quotes
        description: >-
          Global quote endpoint for latest price, volume, change, and change
          percentage for any listed equity symbol.
      - name: Technical Indicators
        description: >-
          50+ technical analysis functions including SMA, EMA, MACD, RSI,
          Bollinger Bands, Stochastic, ADX, OBV, and more.
      - name: Fundamental Data
        description: >-
          Company overview with financial ratios, earnings, income statements,
          balance sheets, cash flow, and ETF holdings data.
      - name: Alpha Intelligence Sentiment
        description: >-
          AI-powered news sentiment analysis for stocks, crypto, and forex with
          bearish/bullish scoring on recent and historical articles.
      - name: Forex and Crypto
        description: >-
          Real-time and historical exchange rates for 100+ currencies and
          cryptocurrencies including intraday, daily, weekly, and monthly data.
      - name: Economic Indicators
        description: >-
          US macroeconomic data including Real GDP, CPI, unemployment, federal
          funds rate, treasury yields, nonfarm payroll, and retail sales.
      - name: Options Data
        description: >-
          Real-time options chains, put-call ratios, and volume-to-OI ratios
          for US equity options markets.
  - type: UseCases
    data:
      - name: Algorithmic Trading
        description: >-
          Build quantitative trading systems using real-time price feeds,
          technical indicators, and sentiment signals from Alpha Vantage.
      - name: Portfolio Analytics
        description: >-
          Analyze portfolio holdings using fundamental data, earnings estimates,
          and historical price data for investment decision support.
      - name: Financial Application Development
        description: >-
          Integrate market data into fintech apps, wealth management platforms,
          or stock screeners using the Alpha Vantage API.
      - name: Macro Economic Research
        description: >-
          Monitor US economic indicators for investment thesis development and
          macroeconomic trend analysis.
  - type: Integrations
    data:
      - name: Python
        description: >-
          Python integration using alpha_vantage library or direct requests
          to the REST API with pandas DataFrame support.
      - name: JavaScript
        description: >-
          Node.js and browser JavaScript integration for real-time market data
          in web applications and trading dashboards.
      - name: Spreadsheets
        description: >-
          Google Sheets and Excel integration via Alpha Vantage spreadsheet
          add-ons for non-technical financial analysis.
