specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Alpha Vantage
providerId: alpha-vantage
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
  - Fintech
  - Market Data
  - Plans
description: >-
  Alpha Vantage offers a free tier (25 requests per day, 5 per minute) and premium monthly or annual
  subscriptions ranging from $49.99/month (75 rpm) to $249.99/month (1,200 rpm), plus custom plans
  for higher volume. Annual plans are billed at roughly 10x monthly (two months free).
sources:
  - https://www.alphavantage.co/premium/
  - https://www.alphavantage.co/support/
plans:
  - id: alpha-vantage-free
    name: Free
    type: freemium
    description: Free tier - 25 API requests per day, 5 requests per minute, claim free key with email.
    entries:
      - label: Daily quota
        name: free_daily
        type: quota
        metric: request
        limit: 25
        timeFrame: day
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate limit
        name: free_rate
        type: quota
        metric: requests_per_minute
        limit: 5
        timeFrame: minute
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: All standard endpoints
      - name: 20+ years historical data
  - id: alpha-vantage-premium-49
    name: Premium 75 rpm
    type: subscription
    description: $49.99/month (or $499/year) for 75 requests per minute, no daily cap.
