specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Alpha Vantage
providerId: alpha-vantage
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
  - Fintech
  - Market Data
  - Rate Limiting
description: >-
  Alpha Vantage limits its free tier to 25 API requests per day and 5 requests per minute. Premium
  tiers raise the per-minute cap to 75, 150, 300, 600, or 1,200 requests per minute (no daily cap).
  Throttled requests return a JSON body with Note or Information indicating the limit, rather than
  HTTP 429.
sources:
  - https://www.alphavantage.co/premium/
  - https://www.alphavantage.co/support/
responseCodes:
  throttled: 200
limits:
  - name: Free
    scope: api_key
    metric: requests_per_day
    limit: 25
    notes: Free key daily quota.
  - name: Free per-minute
    scope: api_key
    metric: requests_per_minute
    limit: 5
    notes: Free key burst limit.
  - name: Premium 75 rpm
    scope: api_key
    metric: requests_per_minute
    limit: 75
  - name: Premium 150 rpm
    scope: api_key
    metric: requests_per_minute
    limit: 150
  - name: Premium 300 rpm
    scope: api_key
    metric: requests_per_minute
    limit: 300
  - name: Premium 600 rpm
    scope: api_key
    metric: requests_per_minute
    limit: 600
  - name: Premium 1200 rpm
    scope: api_key
    metric: requests_per_minute
    limit: 1200
policies:
  - name: Soft Throttling
    description: >-
      Throttled responses return HTTP 200 with a JSON body containing a Note or Information field;
      clients must inspect the body, not just the status code.
  - name: Backoff Strategy
    description: Implement exponential backoff with jitter when Note/Information is returned.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
