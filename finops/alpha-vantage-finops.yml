description: >-
  FinOps view of Alpha Vantage. Flat monthly subscription per API key keyed to a per-minute rate
  cap. Annual billing offers two months free. There is no usage-based billing beyond the rate
  cap; allocation is by API key.
sources:
  - https://www.alphavantage.co/premium/
