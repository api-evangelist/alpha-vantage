meters:
  - name: subscription
    description: Monthly or annual premium subscription for an API key.
    unit: month
    aggregation: sum
    dimensions:
      - api_key
principles:
  - name: Visibility
    description: Tie each API key to a single owning workload; collect monthly invoice into FinOps store.
  - name: Allocation
    description: Allocate subscription to consuming product. Premium keys cannot be split across users.
  - name: Optimization
    description: Move down-tier when measured rpm consistently below cap; switch to annual for ~17% savings.
  - name: Accountability
    description: Assign a billing owner per API key; review at renewal.
